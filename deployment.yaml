apiVersion: apps/v1
kind: Deployment
metadata:
  name: homecare-backend
  labels:
    app: homecare-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: homecare-backend
  template:
    metadata:
      labels:
        app: homecare-backend
      annotations:
        restartedAt: "2026-04-04T12:00:00Z"  # Update this timestamp
    spec:
      tolerations:
        - key: "CriticalAddonsOnly"
          operator: "Exists"
      containers:
        - name: homecare-backend
          image: your-registry/homecare-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: homecare-backend-secrets
                  key: DB_HOST
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: homecare-backend-secrets
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: homecare-backend-secrets
                  key: DB_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: homecare-backend-secrets
                  key: DB_NAME
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: homecare-backend-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: homecare-backend-config
                  key: CORS_ORIGIN
          readinessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Secret
metadata:
  name: homecare-backend-secrets
type: Opaque
stringData:
  DB_HOST: db-host-here
  DB_USER: db-user-here
  DB_PASSWORD: db-password-here
  DB_NAME: db-name-here
  JWT_SECRET: jwt-secret-here
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homecare-backend-config
data:
  CORS_ORIGIN: "http://192.168.1.100:3000"
